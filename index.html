<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cart">
<meta name="theme-color" content="#0e0c0b">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<title>Cart</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0907;--surface:#1e1610;--surface2:#261e14;
  --accent:#F0841A;--accent-dim:#3a1e08;
  --text:#fff4e8;--text2:#ecdcc8;--muted:#b8a898;--faint:#6e5e50;
  --border:#36281a;--border2:#46382a;
  --danger-bg:#2a1408;--danger-bdr:#5a2e10;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased}

/* APP */
#app{display:flex;flex-direction:column;height:100%;width:100%;overflow:hidden;position:relative}

/* MAIN VIEW */
#main-view{
  position:absolute;inset:0;display:flex;flex-direction:column;
  background:var(--bg);z-index:1;
  transition:transform .28s cubic-bezier(.32,.72,0,1),filter .28s;
  will-change:transform
}
#main-view.drawer-open{transform:translateX(-75px);filter:brightness(.38);pointer-events:none}

/* HEADER */
#header{
  padding-top:calc(var(--safe-top) + 12px);
  padding-left:18px;padding-right:18px;padding-bottom:12px;
  border-bottom:.5px solid var(--border);background:var(--bg);
  flex-shrink:0;display:flex;justify-content:space-between;align-items:center;
  position:relative;z-index:2;user-select:none
}
#header-left h1{font-size:20px;font-weight:500;color:var(--text);letter-spacing:-.3px}
#header-left p{font-size:11px;color:var(--muted);margin-top:2px}
#header-right{display:flex;align-items:center;gap:6px;color:var(--faint);font-size:11px;font-weight:500;cursor:pointer;padding:6px 0 6px 6px}
.swipe-hint-arrow{width:12px;height:12px;border-top:1.5px solid var(--faint);border-right:1.5px solid var(--faint);border-radius:2px;transform:rotate(45deg);flex-shrink:0}

/* LIST ACTIONS */
#list-actions{display:flex;gap:8px;padding:10px 14px;border-bottom:.5px solid var(--border);flex-shrink:0}
.action-btn{flex:1;padding:9px 0;border-radius:10px;background:var(--surface2);border:.5px solid var(--border2);color:var(--muted);font-size:12px;font-weight:500;text-align:center;cursor:pointer;font-family:var(--font);transition:opacity .15s;-webkit-appearance:none}
.action-btn:active{opacity:.7}
.action-btn.danger{color:var(--accent);background:var(--danger-bg);border-color:var(--danger-bdr)}

/* LIST BODY */
#list-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 90px)}
#list-body::-webkit-scrollbar{display:none}

/* EMPTY */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 40px;gap:10px;text-align:center}
.empty-icon{font-size:44px;opacity:.4}
#empty-state p{font-size:15px;color:var(--muted)}
#empty-state span{font-size:13px;color:var(--faint)}

/* ZONE SECTION */
.zone-section{padding:0 14px}
.zone-header{display:flex;align-items:center;gap:8px;padding:14px 0 7px}
.zone-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.zone-count{font-size:10px;color:var(--faint);font-weight:500}
.zone-line{flex:1;height:.5px;background:var(--border)}

/* LIST ITEM */
.list-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:.5px solid var(--border);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:opacity .2s;user-select:none}
.list-item.checked{opacity:.36}
.list-item.checked .item-name{text-decoration:line-through}
.check-circle{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.check-circle.done{background:var(--accent);border-color:var(--accent)}
.check-circle.done::after{content:'';width:5px;height:9px;border-right:2px solid white;border-bottom:2px solid white;transform:rotate(45deg) translate(-1px,-1px);display:block}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-qty{font-size:12px;color:var(--muted);margin-top:2px}
.item-delete{width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:20px;flex-shrink:0;border-radius:50%;transition:color .15s}
.item-delete:active{color:var(--accent)}

/* FAB */
#fab{position:absolute;right:20px;bottom:calc(var(--safe-bottom) + 24px);width:54px;height:54px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(232,98,42,.45);z-index:10;cursor:pointer;transition:transform .15s,opacity .15s;user-select:none}
#fab:active{transform:scale(.93);opacity:.85}

/* DRAWER OVERLAY */
#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:20;pointer-events:none;transition:background .28s}
#drawer-overlay.open{background:rgba(0,0,0,.65);pointer-events:all}

/* DRAWER */
#drawer{position:fixed;top:0;right:0;bottom:0;width:315px;background:var(--surface);border-left:.5px solid var(--border);box-shadow:none;z-index:25;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,0,1),box-shadow .28s;will-change:transform}
#drawer.open{box-shadow:-20px 0 60px rgba(0,0,0,.6)}
#drawer.open{transform:translateX(0)}
#drawer-header{padding-top:calc(var(--safe-top) + 12px);padding-left:20px;padding-right:20px;padding-bottom:14px;border-bottom:.5px solid var(--border);flex-shrink:0}
#drawer-header h2{font-size:20px;font-weight:500;color:var(--text)}
#drawer-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 14px calc(var(--safe-bottom) + 24px)}
#drawer-body::-webkit-scrollbar{display:none}
.drawer-section-title{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:16px 0 4px}
.drawer-section-note{font-size:11px;color:var(--faint);margin-bottom:10px;line-height:1.5}

/* ZONE ROWS */
#zone-list{display:flex;flex-direction:column;gap:5px}
.zone-row{display:flex;align-items:center;gap:8px;padding:11px 12px;background:var(--bg);border:.5px solid var(--border);border-radius:11px;user-select:none;transition:background .15s,border-color .15s}
.zone-row.drag-over{border-color:var(--accent);background:#1a1410}
.zone-row.dragging{opacity:.4}
.drag-handle{color:var(--faint);font-size:16px;cursor:grab;padding:2px 4px;touch-action:none;flex-shrink:0}
.zone-row-name{flex:1;font-size:13px;font-weight:500;color:var(--text2);min-width:0}
.zone-rename-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--accent);color:var(--text);font-size:13px;font-weight:500;font-family:var(--font);outline:none;padding:2px 0;min-width:0}
.zone-edit-btn,.zone-del-btn{font-size:14px;cursor:pointer;padding:4px 5px;background:none;border:none;font-family:var(--font);transition:opacity .15s;flex-shrink:0}
.zone-edit-btn{color:var(--muted)}
.zone-del-btn{color:var(--faint);font-size:18px}
.zone-del-btn:active,.zone-edit-btn:active{opacity:.6}

/* ADD ZONE */
#add-zone-row{display:flex;gap:8px;margin-top:8px}
#add-zone-input{flex:1;background:var(--bg);border:1.5px solid var(--border2);border-radius:11px;padding:11px 14px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;-webkit-appearance:none}
#add-zone-input::placeholder{color:var(--muted)}
#add-zone-input:focus{border-color:var(--accent)}
#add-zone-btn{width:44px;height:44px;border-radius:11px;background:var(--accent);color:white;font-size:24px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;font-family:var(--font);transition:opacity .15s}
#add-zone-btn:active{opacity:.8}

/* DATA ROWS */
.data-row{display:flex;align-items:center;justify-content:space-between;padding:13px 12px;background:var(--bg);border:.5px solid var(--border);border-radius:11px;margin-bottom:5px;cursor:pointer;transition:opacity .15s}
.data-row:active{opacity:.7}
.data-row-label{font-size:13px;font-weight:500;color:var(--text2)}
.data-row-hint{font-size:12px;color:var(--muted)}
.data-row.danger .data-row-label{color:var(--accent)}

/* ADD SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:30;opacity:0;pointer-events:none;transition:opacity .28s}
.sheet-overlay.visible{opacity:1;pointer-events:all}
#add-sheet{position:fixed;left:0;right:0;bottom:0;height:75dvh;background:var(--surface);border-radius:26px 26px 0 0;z-index:40;display:flex;flex-direction:column;padding:0 20px calc(var(--safe-bottom) + 20px);transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1)}
#add-sheet.open{transform:translateY(0)}
.sheet-handle{width:38px;height:4px;background:var(--border2);border-radius:99px;margin:14px auto 20px;flex-shrink:0}
.sheet-title{font-size:17px;font-weight:500;color:var(--text);margin-bottom:22px;flex-shrink:0}
.field-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;flex-shrink:0}
.field-input{width:100%;background:var(--surface2);border:1.5px solid var(--border2);border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;font-family:var(--font);margin-bottom:18px;outline:none;-webkit-appearance:none;flex-shrink:0}
.field-input::placeholder{color:var(--muted)}
.field-input:focus{border-color:var(--accent)}
.field-input.shake{animation:shake .35s ease;border-color:var(--accent)}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
#zone-chips-wrap{flex-shrink:0;margin-bottom:0;overflow:visible}
#zone-chips{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:4px}
.zone-chip{padding:8px 15px;border-radius:99px;background:var(--surface2);border:1.5px solid var(--border2);color:var(--muted);font-size:13px;font-weight:500;white-space:nowrap;cursor:pointer;transition:background .15s,border-color .15s,color .15s;font-family:var(--font)}
.zone-chip.selected{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.zone-chip:active{opacity:.7}
.sheet-spacer{flex:1}
#add-submit{width:100%;padding:18px;border-radius:14px;background:var(--accent);color:white;font-size:15px;font-weight:500;font-family:var(--font);text-align:center;border:none;cursor:pointer;flex-shrink:0;transition:opacity .15s;-webkit-appearance:none}
#add-submit:active{opacity:.8}

/* PROMPT */
#prompt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s}
#prompt-overlay.visible{opacity:1;pointer-events:all}
#prompt-box{width:100%;max-width:320px;background:var(--surface);border:.5px solid var(--border2);border-radius:20px;padding:24px 20px 20px}
#prompt-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px}
#prompt-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
#prompt-buttons{display:flex;flex-direction:column;gap:8px}
.prompt-btn{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:500;font-family:var(--font);border:none;cursor:pointer;transition:opacity .15s;text-align:center}
.prompt-btn:active{opacity:.75}
.prompt-btn.primary{background:var(--accent);color:white}
.prompt-btn.secondary{background:var(--surface2);color:var(--text2)}
.prompt-btn.danger{background:var(--danger-bg);color:var(--accent);border:.5px solid var(--danger-bdr)}

#file-input{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="main-view">
    <div id="header">
      <div id="header-left">
        <h1>Cart</h1>
        <p id="header-sub">No items</p>
      </div>
      <div id="header-right">
        <span>Zones</span>
        <div class="swipe-hint-arrow"></div>
      </div>
    </div>
    <div id="list-actions">
      <button class="action-btn" id="btn-clear-checked">Clear checked</button>
      <button class="action-btn danger" id="btn-clear-all">Clear all</button>
    </div>
    <div id="list-body"></div>
    <div id="fab"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="11" y1="2" x2="11" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/><line x1="2" y1="11" x2="20" y2="11" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg></div>
  </div>

  <div id="drawer-overlay"></div>

  <div id="drawer">
    <div id="drawer-header"><h2>Settings</h2></div>
    <div id="drawer-body">
      <div class="drawer-section-title">Store Zones</div>
      <div class="drawer-section-note">Drag to reorder · sets shopping list sort order</div>
      <div id="zone-list"></div>
      <div id="add-zone-row">
        <input id="add-zone-input" type="text" placeholder="New zone name…" autocomplete="off">
        <button id="add-zone-btn">+</button>
      </div>
      <div class="drawer-section-title" style="margin-top:24px">Data</div>
      <div class="data-row" id="btn-export"><span class="data-row-label">Export backup</span><span class="data-row-hint">JSON ↗</span></div>
      <div class="data-row" id="btn-import"><span class="data-row-label">Import backup</span><span class="data-row-hint">JSON ↙</span></div>
      <div class="data-row danger" id="btn-clear-data"><span class="data-row-label">Clear all data</span></div>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="sheet-overlay"></div>
<div id="add-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Add item</div>
  <div class="field-label">Item name</div>
  <input class="field-input" id="input-name" type="text" placeholder="e.g. Coconut milk" autocomplete="off" autocorrect="off" autocapitalize="sentences">
  <div class="field-label">Quantity <span style="color:var(--faint);font-size:10px;text-transform:none;letter-spacing:0;font-weight:400">(optional)</span></div>
  <input class="field-input" id="input-qty" type="text" placeholder="e.g. 400ml, 2 cans" autocomplete="off">
  <div class="field-label">Zone</div>
  <div id="zone-chips-wrap"><div id="zone-chips"></div></div>
  <div class="sheet-spacer"></div>
  <button id="add-submit">Add to list</button>
</div>

<div id="prompt-overlay">
  <div id="prompt-box">
    <div id="prompt-title"></div>
    <div id="prompt-sub"></div>
    <div id="prompt-buttons"></div>
  </div>
</div>

<input type="file" id="file-input" accept=".json">

<script>
/* ── STATE ── */
const STORAGE_KEY='cart-state';
const DEFAULT_ZONES=['Fresh Produce','Deli','Bulk Foods','Gluten Free','Health Foods','Confectionery','Drinks','International','Condiments','Canned Goods','Spices','Baking'];
let state={items:[],zones:[...DEFAULT_ZONES]};

function loadState(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r){state=JSON.parse(r)}
  if(!Array.isArray(state.items))state.items=[];
  if(!Array.isArray(state.zones))state.zones=[...DEFAULT_ZONES];
  }catch(e){state={items:[],zones:[...DEFAULT_ZONES]}}
}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ── RENDER LIST ── */
function renderList(){
  const body=document.getElementById('list-body');
  if(state.items.length===0){
    body.innerHTML='<div id="empty-state"><div class="empty-icon">🛒</div><p>Your list is empty</p><span>Tap + to add your first item</span></div>';
    updateHeader();return;
  }
  const grouped={};
  state.zones.forEach(z=>grouped[z]=[]);
  grouped['Uncategorised']=[];
  state.items.forEach(item=>{
    const k=state.zones.includes(item.zone)?item.zone:'Uncategorised';
    grouped[k].push(item);
  });
  let html='';
  [...state.zones,'Uncategorised'].forEach(zone=>{
    const items=grouped[zone];
    if(!items||items.length===0)return;
    const sorted=[...items].sort((a,b)=>a.checked===b.checked?0:a.checked?1:-1);
    html+=`<div class="zone-section"><div class="zone-header"><span class="zone-label">${esc(zone)}</span><span class="zone-count">${items.length}</span><div class="zone-line"></div></div>`;
    sorted.forEach(item=>{
      html+=`<div class="list-item${item.checked?' checked':''}" data-id="${item.id}">
        <div class="check-circle${item.checked?' done':''}"></div>
        <div class="item-info"><div class="item-name">${esc(item.name)}</div>${item.qty?`<div class="item-qty">${esc(item.qty)}</div>`:''}</div>
        <div class="item-delete" data-del="${item.id}">×</div>
      </div>`;
    });
    html+='</div>';
  });
  body.innerHTML=html;
  body.querySelectorAll('.list-item').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.dataset.del)return;
      const item=state.items.find(i=>i.id===el.dataset.id);
      if(!item)return;
      item.checked=!item.checked;item.checkedAt=item.checked?Date.now():null;
      saveState();renderList();
    });
  });
  body.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      state.items=state.items.filter(i=>i.id!==el.dataset.del);
      saveState();renderList();
    });
  });
  updateHeader();
}

function updateHeader(){
  const total=state.items.length;
  const zones=new Set(state.items.map(i=>state.zones.includes(i.zone)?i.zone:'Uncategorised')).size;
  document.getElementById('header-sub').textContent=total===0?'No items':`${total} item${total!==1?'s':''} · ${zones} zone${zones!==1?'s':''}`;
}

/* ── ADD SHEET ── */
let selZone=null;
function openSheet(){
  selZone=state.zones[0]||null;
  renderChips();
  document.getElementById('input-name').value='';
  document.getElementById('input-qty').value='';
  document.getElementById('add-sheet').classList.add('open');
  document.getElementById('sheet-overlay').classList.add('visible');
  setTimeout(()=>document.getElementById('input-name').focus(),320);
}
function closeSheet(){
  document.getElementById('add-sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('visible');
  if(document.activeElement)document.activeElement.blur();
}
function renderChips(){
  const wrap=document.getElementById('zone-chips');
  wrap.innerHTML=state.zones.map(z=>`<div class="zone-chip${z===selZone?' selected':''}" data-zone="${esc(z)}">${esc(z)}</div>`).join('');
  wrap.querySelectorAll('.zone-chip').forEach(c=>{
    c.addEventListener('click',()=>{selZone=c.dataset.zone;renderChips()});
  });
}
document.getElementById('fab').addEventListener('click',openSheet);
document.getElementById('sheet-overlay').addEventListener('click',closeSheet);
document.getElementById('add-submit').addEventListener('click',()=>{
  const nameEl=document.getElementById('input-name');
  const name=nameEl.value.trim();
  if(!name){nameEl.classList.add('shake');setTimeout(()=>nameEl.classList.remove('shake'),400);return}
  const qty=document.getElementById('input-qty').value.trim();
  const zone=selZone||(state.zones[0]||'Uncategorised');
  state.items.push({id:uid(),name,qty,zone,checked:false,checkedAt:null});
  saveState();renderList();closeSheet();
});
document.getElementById('input-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('input-qty').focus()});
document.getElementById('input-qty').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-submit').click()});

/* ── CLEAR ACTIONS ── */
document.getElementById('btn-clear-checked').addEventListener('click',()=>{
  if(!state.items.some(i=>i.checked))return;
  state.items=state.items.filter(i=>!i.checked);saveState();renderList();
});
document.getElementById('btn-clear-all').addEventListener('click',()=>{
  if(state.items.length===0)return;
  showPrompt({title:'Clear all items?',sub:'This will remove everything from your list.',buttons:[
    {label:'Clear all',cls:'danger',action:()=>{state.items=[];saveState();renderList()}},
    {label:'Cancel',cls:'secondary'}
  ]});
});

/* ── DRAWER ── */
let drawerOpen=false;
let tStartX=0,tStartY=0,tTracking=false;
const mainView=document.getElementById('main-view');
const drawer=document.getElementById('drawer');
const drawerOvr=document.getElementById('drawer-overlay');

function openDrawer(){drawerOpen=true;drawer.classList.add('open');drawerOvr.classList.add('open');mainView.classList.add('drawer-open');renderZoneList()}
function closeDrawer(){drawerOpen=false;drawer.classList.remove('open');drawerOvr.classList.remove('open');mainView.classList.remove('drawer-open')}

drawerOvr.addEventListener('click',closeDrawer);
document.getElementById('header-right').addEventListener('click',()=>drawerOpen?closeDrawer():openDrawer());

mainView.addEventListener('touchstart',e=>{
  if(document.getElementById('add-sheet').classList.contains('open'))return;
  tStartX=e.touches[0].clientX;tStartY=e.touches[0].clientY;tTracking=true;
},{passive:true});
mainView.addEventListener('touchmove',e=>{
  if(!tTracking)return;
  const dx=e.touches[0].clientX-tStartX,dy=e.touches[0].clientY-tStartY;
  if(Math.abs(dy)>Math.abs(dx)*1.5){tTracking=false}
},{passive:true});
mainView.addEventListener('touchend',e=>{
  if(!tTracking)return;tTracking=false;
  const dx=e.changedTouches[0].clientX-tStartX;
  if(!drawerOpen&&dx<-60)openDrawer();
  if(drawerOpen&&dx>60)closeDrawer();
});
drawer.addEventListener('touchstart',e=>{tStartX=e.touches[0].clientX},{passive:true});
drawer.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tStartX;
  if(drawerOpen&&dx>60)closeDrawer();
});

/* ── ZONE MANAGER ── */
let dragSrcIdx=null;
function renderZoneList(){
  const list=document.getElementById('zone-list');
  list.innerHTML=state.zones.map((z,i)=>`
    <div class="zone-row" draggable="true" data-idx="${i}">
      <span class="drag-handle" data-hidx="${i}">⠿</span>
      <span class="zone-row-name">${esc(z)}</span>
      <button class="zone-edit-btn" data-edit="${i}">✏️</button>
      <button class="zone-del-btn" data-del="${i}">×</button>
    </div>`).join('');

  list.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();startRename(parseInt(b.dataset.edit))}));
  list.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const idx=parseInt(b.dataset.del),name=state.zones[idx];
    const count=state.items.filter(i=>i.zone===name).length;
    showPrompt({title:`Delete "${name}"?`,
      sub:count>0?`${count} item${count!==1?'s':''} will become Uncategorised.`:'This zone is empty.',
      buttons:[
        {label:'Delete zone',cls:'danger',action:()=>{
          state.items.forEach(i=>{if(i.zone===name)i.zone='Uncategorised'});
          state.zones.splice(idx,1);saveState();renderZoneList();renderList();
        }},
        {label:'Cancel',cls:'secondary'}
      ]
    });
  }));

  // Desktop drag
  list.querySelectorAll('.zone-row').forEach(row=>{
    row.addEventListener('dragstart',e=>{dragSrcIdx=parseInt(row.dataset.idx);row.classList.add('dragging');e.dataTransfer.effectAllowed='move'});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');list.querySelectorAll('.zone-row').forEach(r=>r.classList.remove('drag-over'))});
    row.addEventListener('dragover',e=>{e.preventDefault();list.querySelectorAll('.zone-row').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over')});
    row.addEventListener('drop',e=>{
      e.preventDefault();const ti=parseInt(row.dataset.idx);
      if(dragSrcIdx===null||dragSrcIdx===ti)return;
      const[m]=state.zones.splice(dragSrcIdx,1);state.zones.splice(ti,0,m);
      dragSrcIdx=null;saveState();renderZoneList();renderList();
    });
  });

  // iOS touch drag
  attachTouchDrag(list);
}

function attachTouchDrag(list){
  let tidx=null,ghost=null,rows=[],sy=0,moved=false;
  list.querySelectorAll('.drag-handle').forEach(handle=>{
    handle.addEventListener('touchstart',e=>{
      e.stopPropagation();
      tidx=parseInt(handle.dataset.hidx);
      rows=Array.from(list.querySelectorAll('.zone-row'));
      sy=e.touches[0].clientY;moved=false;
      const rect=rows[tidx].getBoundingClientRect();
      ghost=rows[tidx].cloneNode(true);
      Object.assign(ghost.style,{position:'fixed',left:rect.left+'px',right:(window.innerWidth-rect.right)+'px',top:rect.top+'px',zIndex:'100',opacity:'0.95',background:'var(--accent-dim)',border:'1px solid var(--accent)',borderRadius:'11px',pointerEvents:'none',boxShadow:'0 4px 20px rgba(0,0,0,.5)',margin:'0',transition:'none'});
      document.body.appendChild(ghost);
      rows[tidx].style.opacity='0.3';
    },{passive:true});

    handle.addEventListener('touchmove',e=>{
      if(tidx===null||!ghost)return;
      e.preventDefault();moved=true;
      const y=e.touches[0].clientY,dy=y-sy;
      ghost.style.top=(parseFloat(ghost.style.top)+dy)+'px';sy=y;
      rows.forEach(r=>r.classList.remove('drag-over'));
      const over=rows.find((r,i)=>{if(i===tidx)return false;const rc=r.getBoundingClientRect();return y>=rc.top&&y<=rc.bottom});
      if(over)over.classList.add('drag-over');
    },{passive:false});

    handle.addEventListener('touchend',e=>{
      if(tidx===null)return;
      const y=e.changedTouches[0].clientY;
      let ti=tidx;
      rows.forEach((r,i)=>{if(i===tidx)return;const rc=r.getBoundingClientRect();if(y>=rc.top&&y<=rc.bottom)ti=i;r.classList.remove('drag-over')});
      if(ghost){ghost.remove();ghost=null}
      if(rows[tidx])rows[tidx].style.opacity='';
      if(moved&&ti!==tidx){const[m]=state.zones.splice(tidx,1);state.zones.splice(ti,0,m);saveState();renderZoneList();renderList()}
      tidx=null;
    },{passive:true});
  });
}

function startRename(idx){
  const list=document.getElementById('zone-list');
  const row=list.querySelector(`.zone-row[data-idx="${idx}"]`);if(!row)return;
  const span=row.querySelector('.zone-row-name');
  const orig=state.zones[idx];
  span.outerHTML=`<input class="zone-rename-input" value="${esc(orig)}" data-ridx="${idx}">`;
  const inp=row.querySelector('.zone-rename-input');
  inp.focus();inp.select();
  function commit(){
    const v=inp.value.trim();
    if(v&&v!==orig){state.items.forEach(i=>{if(i.zone===orig)i.zone=v});state.zones[idx]=v;saveState();renderList()}
    renderZoneList();
  }
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();inp.blur()}});
}

document.getElementById('add-zone-btn').addEventListener('click',addZone);
document.getElementById('add-zone-input').addEventListener('keydown',e=>{if(e.key==='Enter')addZone()});
function addZone(){
  const inp=document.getElementById('add-zone-input');
  const name=inp.value.trim();if(!name)return;
  if(state.zones.map(z=>z.toLowerCase()).includes(name.toLowerCase())){
    inp.style.borderColor='var(--accent)';setTimeout(()=>inp.style.borderColor='',1200);return;
  }
  state.zones.push(name);inp.value='';saveState();renderZoneList();renderList();
}

/* ── DATA ── */
document.getElementById('btn-export').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`cart-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
});
document.getElementById('btn-import').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(!Array.isArray(p.items)||!Array.isArray(p.zones))throw new Error();
      showPrompt({title:'Import backup?',sub:'This will replace all current data.',buttons:[
        {label:'Import',cls:'primary',action:()=>{state=p;saveState();renderList();renderZoneList();closeDrawer()}},
        {label:'Cancel',cls:'secondary'}
      ]});
    }catch{
      showPrompt({title:'Invalid file',sub:"This doesn't look like a Cart backup.",buttons:[{label:'OK',cls:'secondary'}]});
    }
  };
  reader.readAsText(file);e.target.value='';
});
document.getElementById('btn-clear-data').addEventListener('click',()=>{
  showPrompt({title:'Clear all data?',sub:'Your shopping list will be deleted. Zones are kept.',buttons:[
    {label:'Clear data',cls:'danger',action:()=>{state.items=[];saveState();renderList()}},
    {label:'Cancel',cls:'secondary'}
  ]});
});

/* ── PROMPT ── */
function showPrompt({title,sub,buttons}){
  document.getElementById('prompt-title').textContent=title;
  document.getElementById('prompt-sub').textContent=sub;
  const wrap=document.getElementById('prompt-buttons');wrap.innerHTML='';
  buttons.forEach(b=>{
    const btn=document.createElement('button');
    btn.className=`prompt-btn ${b.cls}`;btn.textContent=b.label;
    btn.addEventListener('click',()=>{closePrompt();if(b.action)b.action()});
    wrap.appendChild(btn);
  });
  document.getElementById('prompt-overlay').classList.add('visible');
}
function closePrompt(){document.getElementById('prompt-overlay').classList.remove('visible')}
document.getElementById('prompt-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('prompt-overlay'))closePrompt()});

/* ── INIT ── */
loadState();
renderList();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
</script>
